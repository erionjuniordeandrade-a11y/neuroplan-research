name: tests

# The test suite IS the safety contract for NeuroPlan's de-identification,
# registration-quality, and metric gates. Run it on every push and PR so a
# regression in a safety-critical module cannot merge green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev/test dependencies
        run: |
          python -m pip install --upgrade pip
          # Slicer's bundled Python runs the extension; CI only needs the
          # standalone safety modules' deps (pydicom, numpy, pytest).
          pip install pydicom numpy pytest

      - name: Run the safety test suite
        run: pytest -q
